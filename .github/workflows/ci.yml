name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24, 26]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run validate:node-support
      - run: npm run validate:docs
      - run: npm run test:docs
      - run: npm run test:release-check
      - run: npm run test:artifact
      - run: npm test
      - run: npm run validate:cli-contracts
      - run: npm run smoke:fake
      - run: bash test/shell/install.test.sh
      - run: bash test/shell/npm-package-install.test.sh
      - run: npm run release:check
      - run: npm run artifact:build
